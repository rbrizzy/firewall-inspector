<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420" role="img" aria-label="Firewall Inspector — a Papers, Please-style firewall game. Read the packet, consult the ruleset, stamp ALLOW or DENY.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1320"/>
      <stop offset="0.55" stop-color="#141b2b"/>
      <stop offset="1" stop-color="#1b2438"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e7ecf6"/>
      <stop offset="1" stop-color="#9db8ff"/>
    </linearGradient>
    <radialGradient id="blast" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff7a72" stop-opacity="0.55"/>
      <stop offset="0.6" stop-color="#ff7a72" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ff7a72" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse">
      <path d="M26 0H0V26" fill="none" stroke="#33405c" stroke-opacity="0.20" stroke-width="1"/>
    </pattern>
    <style>
      .mono { font-family: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace; }
      .sans { font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    </style>
  </defs>

  <!-- backdrop -->
  <rect width="1200" height="420" rx="18" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="18" fill="url(#grid)"/>
  <rect x="1.5" y="1.5" width="1197" height="417" rx="17" fill="none" stroke="#33405c" stroke-opacity="0.7"/>

  <!-- ==================== LEFT: title block ==================== -->
  <g transform="translate(72 96)">
    <text class="mono" x="2" y="0" fill="#6f96ff" font-size="15" letter-spacing="4">DEFENSIVE SECURITY · TEACHING GAME</text>
    <text class="sans" x="0" y="70" fill="url(#title)" font-size="72" font-weight="800" letter-spacing="1">FIREWALL</text>
    <text class="sans" x="0" y="140" fill="#e7ecf6" font-size="72" font-weight="800" letter-spacing="1">INSPECTOR</text>
    <text class="sans" x="2" y="184" fill="#9aa7c2" font-size="19">Read the packet. Consult the ruleset.</text>
    <text class="sans" x="2" y="210" fill="#9aa7c2" font-size="19">Stamp <tspan fill="#57d999" font-weight="700">ALLOW</tspan> or <tspan fill="#ff7a72" font-weight="700">DENY</tspan>.</text>

    <!-- key hints -->
    <g transform="translate(0 244)" class="mono" font-size="14">
      <g>
        <rect x="0" y="-16" width="26" height="24" rx="5" fill="#202a40" stroke="#33405c"/>
        <text x="13" y="1" text-anchor="middle" fill="#e7ecf6">A</text>
        <text x="36" y="1" fill="#9aa7c2">Allow</text>
      </g>
      <g transform="translate(112 0)">
        <rect x="0" y="-16" width="26" height="24" rx="5" fill="#202a40" stroke="#33405c"/>
        <text x="13" y="1" text-anchor="middle" fill="#e7ecf6">D</text>
        <text x="36" y="1" fill="#9aa7c2">Deny</text>
      </g>
      <g transform="translate(214 0)">
        <rect x="0" y="-16" width="26" height="24" rx="5" fill="#202a40" stroke="#33405c"/>
        <text x="13" y="1" text-anchor="middle" fill="#e7ecf6">R</text>
        <text x="36" y="1" fill="#9aa7c2">Rulebook</text>
      </g>
    </g>
  </g>

  <!-- ==================== RIGHT: inspection scene ==================== -->
  <g transform="translate(690 0)">
    <!-- incoming packet stream -->
    <g class="mono" font-size="11" fill="#6f96ff">
      <g opacity="0.55"><rect x="8" y="120" width="34" height="22" rx="5" fill="#182031" stroke="#33405c"/><text x="25" y="135" text-anchor="middle" fill="#9aa7c2">pkt</text></g>
      <g opacity="0.75"><rect x="8" y="196" width="34" height="22" rx="5" fill="#182031" stroke="#33405c"/><text x="25" y="211" text-anchor="middle" fill="#9aa7c2">pkt</text></g>
      <g opacity="0.9"><rect x="8" y="272" width="34" height="22" rx="5" fill="#182031" stroke="#33405c"/><text x="25" y="287" text-anchor="middle" fill="#9aa7c2">pkt</text></g>
      <!-- flow arrows -->
      <g stroke="#6f96ff" stroke-width="1.5" fill="none" opacity="0.65">
        <path d="M46 131 H84" marker-end="url(#a)"/>
        <path d="M46 207 H84" marker-end="url(#a)"/>
        <path d="M46 283 H84" marker-end="url(#a)"/>
      </g>
    </g>
    <defs>
      <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 Z" fill="#6f96ff"/></marker>
    </defs>

    <!-- firewall barrier -->
    <g transform="translate(96 92)">
      <rect x="0" y="0" width="30" height="236" rx="8" fill="#141b2b" stroke="#6f96ff" stroke-opacity="0.6" stroke-dasharray="6 5"/>
      <text class="mono" x="15" y="-12" text-anchor="middle" fill="#6f96ff" font-size="12" letter-spacing="2">FIREWALL</text>
      <!-- brick hint -->
      <g stroke="#33405c" stroke-opacity="0.7"><path d="M0 60 H30 M0 120 H30 M0 180 H30" fill="none"/></g>
    </g>

    <!-- inspection desk: packet under review -->
    <g transform="translate(168 96)">
      <rect x="0" y="0" width="196" height="150" rx="12" fill="#182031" stroke="#33405c"/>
      <text class="mono" x="16" y="28" fill="#9db8ff" font-size="13">PACKET  d01-p02</text>
      <line x1="16" y1="40" x2="180" y2="40" stroke="#33405c"/>
      <g class="mono" font-size="12.5" fill="#c9d3e8">
        <text x="16" y="64">src  203.0.113.20:40222</text>
        <text x="16" y="86">dst  10.0.0.5<tspan fill="#9aa7c2">:23</tspan></text>
        <text x="16" y="108">proto TCP  <tspan fill="#9aa7c2">[SYN]</tspan></text>
        <text x="16" y="130" fill="#ffcf6b">svc  Telnet  (legacy)</text>
      </g>
      <!-- magnifier -->
      <g transform="translate(150 96)" stroke="#9db8ff" stroke-width="2.5" fill="none" opacity="0.9">
        <circle cx="0" cy="0" r="16" fill="#0e1320" fill-opacity="0.5"/>
        <path d="M12 12 L26 26"/>
      </g>
    </g>

    <!-- verdict stamps -->
    <g transform="translate(300 40)">
      <!-- blast glow behind DENY -->
      <circle cx="86" cy="150" r="120" fill="url(#blast)"/>
      <!-- ALLOW stamp -->
      <g transform="translate(0 6) rotate(-9 60 44)">
        <rect x="0" y="0" width="150" height="72" rx="10" fill="#123527" stroke="#57d999" stroke-width="3"/>
        <rect x="7" y="7" width="136" height="58" rx="7" fill="none" stroke="#57d999" stroke-width="1.5" stroke-opacity="0.6"/>
        <path d="M26 40 l12 13 l22 -26" fill="none" stroke="#57d999" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
        <text class="sans" x="96" y="47" text-anchor="middle" fill="#57d999" font-size="26" font-weight="800" letter-spacing="1">ALLOW</text>
      </g>
      <!-- DENY stamp (on top) -->
      <g transform="translate(24 118) rotate(7 75 40)">
        <rect x="0" y="0" width="164" height="80" rx="11" fill="#3a1917" stroke="#ff7a72" stroke-width="3.5"/>
        <rect x="8" y="8" width="148" height="64" rx="8" fill="none" stroke="#ff7a72" stroke-width="1.5" stroke-opacity="0.6"/>
        <g stroke="#ff7a72" stroke-width="6" stroke-linecap="round"><path d="M28 26 l26 28"/><path d="M54 26 l-26 28"/></g>
        <text class="sans" x="104" y="52" text-anchor="middle" fill="#ff7a72" font-size="30" font-weight="800" letter-spacing="1">DENY</text>
      </g>
    </g>
  </g>
</svg>
